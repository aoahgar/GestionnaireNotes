plugins {
    id 'com.android.application'
}

android {
    namespace 'sn.dev.android.gestionnairenotes'

    compileSdk {
        version = release(36) {
            it.minorApiLevel = 1
        }
    }

    defaultConfig {
        applicationId 'sn.dev.android.gestionnairenotes'
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
